name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - bot-service
          - profile-service
          - ranking-service
          - matching-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: services/${{ matrix.service }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio

      - name: Lint with ruff
        working-directory: services/${{ matrix.service }}
        run: |
          ruff check .

      - name: Run tests
        working-directory: services/${{ matrix.service }}
        run: |
          pytest -v --tb=short || echo "No tests found yet"

  docker-build:
    runs-on: ubuntu-latest
    needs: lint-and-test
    strategy:
      matrix:
        service:
          - bot-service
          - profile-service
          - ranking-service
          - matching-service
          - notification-service

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        working-directory: services/${{ matrix.service }}
        run: |
          docker build -t dating-${{ matrix.service }}:test .
