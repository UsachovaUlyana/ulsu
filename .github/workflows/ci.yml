name: CI

on:
  push:
    branches: ["main", "rewrite/main"]
  pull_request:
    branches: ["main", "rewrite/main"]

permissions:
  contents: read

jobs:
  lint:
    name: "Lint (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - bot-service
          - profile-service
          - ranking-service
          - matching-service
          - notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Ruff check
        run: |
          ruff check services/${{ matrix.service }}/app services/${{ matrix.service }}/tests

  tests:
    name: "Tests (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - bot-service
          - profile-service
          - ranking-service
          - matching-service
          - notification-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r services/${{ matrix.service }}/requirements.txt

      - name: Run pytest
        working-directory: services/${{ matrix.service }}
        run: python -m pytest tests -q

  docker-build:
    name: "Docker build (${{ matrix.service }})"
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: bot-service
            dockerfile: services/bot-service/Dockerfile
          - service: profile-service
            dockerfile: services/profile-service/Dockerfile
          - service: ranking-service
            dockerfile: services/ranking-service/Dockerfile
          - service: matching-service
            dockerfile: services/matching-service/Dockerfile
          - service: notification-service
            dockerfile: services/notification-service/Dockerfile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: |
          docker build \
            --file "${{ matrix.dockerfile }}" \
            --tag "dating-${{ matrix.service }}:ci" \
            .
