global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: "profile-service"
    static_configs:
      - targets: ["profile-service:8001"]
    metrics_path: /metrics

  - job_name: "ranking-service"
    static_configs:
      - targets: ["ranking-service:8002"]
    metrics_path: /metrics

  - job_name: "matching-service"
    static_configs:
      - targets: ["matching-service:8003"]
    metrics_path: /metrics
