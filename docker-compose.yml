services:
  rabbitmq:
    image: rabbitmq:3.13-management
    hostname: rabbitmq
    cpus: "1.0"
    mem_limit: "512m"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.2
    hostname: redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    cpus: "1.0"
    mem_limit: "512m"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  bench:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      rabbitmq:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./results:/app/results
    environment:
      - RABBITMQ_HOST=rabbitmq
      - RABBITMQ_PORT=5672
      - RABBITMQ_USER=guest
      - RABBITMQ_PASS=guest
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    profiles: ["manual"]
